<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Writer - AI Email Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        textarea, select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        textarea:focus, select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-generate.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .output-section {
            margin-top: 30px;
            display: none;
        }

        .output-section.show {
            display: block;
        }

        .output-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.success {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.error {
            background: #f8d7da;
            color: #721c24;
        }

        .output-content {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            color: #333;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading-spinner.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: #721c24;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .feature {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .feature strong {
            display: block;
            color: #333;
            margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✉️ Email Writer</h1>
        <p class="subtitle">Generate professional email replies with AI</p>

        <form id="emailForm">
            <div class="form-group">
                <label for="emailContent">Email Content <span style="color: red;">*</span></label>
                <textarea
                    id="emailContent"
                    placeholder="Paste the email you want to reply to..."
                    required>Dear Sir/Madam, I hope this email finds you well. I wanted to follow up on our conversation regarding the project timeline. Could you please provide an update on the current status?</textarea>
            </div>

            <div class="form-group">
                <label for="tone">Tone <span style="color: red;">*</span></label>
                <select id="tone" required>
                    <option value="">Select a tone...</option>
                    <option value="professional">Professional</option>
                    <option value="friendly">Friendly</option>
                    <option value="formal">Formal</option>
                    <option value="casual">Casual</option>
                    <option value="grateful">Grateful</option>
                    <option value="apologetic">Apologetic</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-generate">Generate Email Reply</button>
                <button type="button" class="btn-clear" onclick="clearForm()">Clear</button>
            </div>
        </form>

        <div class="error-message" id="errorMessage"></div>

        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea;">Generating your email...</p>
        </div>

        <div class="output-section" id="outputSection">
            <div class="output-label">
                Generated Reply
                <span class="status-badge" id="statusBadge"></span>
            </div>
            <div class="output-content" id="outputContent"></div>
        </div>

        <div class="features">
            <div class="feature">
                <strong>🚀 AI-Powered</strong>
                Uses GPT-3.5 Turbo for intelligent responses
            </div>
            <div class="feature">
                <strong>⚙️ Customizable</strong>
                Choose your preferred tone of voice
            </div>
            <div class="feature">
                <strong>⚡ Fast</strong>
                Get professional replies in seconds
            </div>
        </div>
    </div>

    <script>
        document.getElementById('emailForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const emailContent = document.getElementById('emailContent').value.trim();
            const tone = document.getElementById('tone').value;
            const errorDiv = document.getElementById('errorMessage');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const outputSection = document.getElementById('outputSection');

            // Clear previous errors
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';

            // Validate inputs
            if (!emailContent) {
                showError('Please enter the email content');
                return;
            }

            if (!tone) {
                showError('Please select a tone');
                return;
            }

            // Show loading spinner
            loadingSpinner.classList.add('show');
            outputSection.classList.remove('show');

            try {
                const response = await fetch('/api/v1/email/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: emailContent,
                        tone: tone
                    })
                });

                const data = await response.json();

                loadingSpinner.classList.remove('show');

                if (response.ok && data.status === 'SUCCESS') {
                    displayOutput(data.content, 'success');
                } else {
                    showError(data.message || 'Failed to generate email');
                }
            } catch (error) {
                loadingSpinner.classList.remove('show');
                showError('Error: ' + error.message);
            }
        });

        function displayOutput(content, status) {
            const outputSection = document.getElementById('outputSection');
            const outputContent = document.getElementById('outputContent');
            const statusBadge = document.getElementById('statusBadge');

            outputContent.textContent = content;
            statusBadge.textContent = '✓ Success';
            statusBadge.className = 'status-badge success';
            outputSection.classList.add('show');

            // Scroll to output
            setTimeout(() => {
                outputSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearForm() {
            document.getElementById('emailForm').reset();
            document.getElementById('outputSection').classList.remove('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        // Check API health on page load
        window.addEventListener('load', async function() {
            try {
                const response = await fetch('/api/v1/email/health');
                if (response.ok) {
                    console.log('✓ API is running');
                }
            } catch (error) {
                console.error('✗ API is not available:', error);
            }
        });
    </script>
</body>
</html>
